# state/chapter-12/locations-state.yaml
# 챕터 12 종료 시점 (= 작품 종결 시점) 장소 상태 스냅샷.

chapter: 12
completed_at: 2026-05-01T22:00:00+09:00

locations:
  shanghai-office:
    status: closed
    notable_changes:
      - "ch8 종료 시점에 도현·이세아 철수 (승계 유지). ch9~ch12 비등장."

  shanghai-concession:
    status: operational
    notes:
      - "ch12 비등장 (배경 유지). 작품 종결 시점에서 상하이 측 사건은 외부 시점 1단락 ('어느 다방' — 도시 미명시) 으로 거울 닫힘."

  kanbu-ferry:
    status: operational
    notes:
      - "ch12 비등장 (운영 유지). ch8 사용 후 작품 종결까지 재등장 없음."

  jongno-station:
    status: operational
    notable_changes:
      - "도현 경무국 복귀 3주차 진입 (1923-03-20 화 오전) — ch12 신규 사용: 박 부장 집무실 한 줄 통보 자리. 작품 종결 시점에서 박 부장 측 다음 행동·반응은 영구 미공개 (집무실 문 너머 봉인)."
    interior:
      park-office:
        type: 박 부장 집무실 (3층)
        notes:
          - "ch12 신규 사용 — 1923-03-20(화) 오전. 도현 입실 자리 lock: 의자 쪽으로 가지 않고 문 안쪽 한 걸음 들어선 자리에 그대로 섬. 1923-01 이후 늘 자리에 앉아 왔던 정확한 앉음 = 두 해 동안 묵인의 형태. 오늘 아침에는 그 형태를 만들지 않음."
          - "박 부장 책상: 서류 위로 가 있던 시선이 한 박자 늦게 도현 쪽으로 돌아옴. 펜 내려놓는 작은 소리. 도현 통보 후 표정 한 번 멈춤·움직임 (도현 측 따라가지 않음)."
          - "결정대사 발화 자리 lock — L.21 도현 '부장님. 1921년 가을의 일은, 더 이상 묻어둘 수 없게 되었습니다.' 책상 위에 한 자락 내려앉은 자리."
          - "박 부장 응답 봉인 자리 lock — L.29 '박 부장의 다음 말은 닫힌 문 너머에 남았다.' 도현이 손잡이에 손 얹은 자리에서 흉터 closure 자각 1회. 문 닫힘. 응답은 닫힌 문 너머에 영구 봉인."
          - "복도: 도현이 자기 자리 갈림길에서 평소라면 오른쪽 꺾었으나 이 아침에는 안 꺾고 박 부장 집무실까지 한 결로 걸음. 손등으로 두 번 두드림."
          - "ch11 L.17 박 부장 결정대사 발화 자리 (1923-03-19) 와 동일 공간 — ch12 도현 측 한 줄 통보 자리로 대칭 사용."
      dohyun-desk:
        type: 도현 자리 (사무실)
        notes:
          - "ch12 비사용 — 도현이 갈림길에서 자기 자리 쪽으로 꺾지 않음. 1923-03-19 (ch11) 마지막 사용 후 작품 종결까지 재등장 없음."
      lee-desk:
        type: 이세아 자리 (사무실, 도현 자리에서 두 걸음 반 옆)
        notes:
          - "ch12 비사용 — 이세아 1923-03-19 오후 부재 후 작품 종결 시점까지 사무실 재등장 없음. 외부 시점 1단락 ('어느 다방 창가') 에서만 외화. 사무실 자리는 작품 종결 시점에도 ch11 부재 모양 그대로일 가능성 (외화 없음)."
    notes:
      - "박 부장 배후 closure — ch11 외부 행동 첫 가시화 (1921 카드 사용) → ch12 응답 봉인 (닫힌 문 너머). 작품 종결 시점에서 박 부장 측 다음 행동·내적 동기는 의도적 미공개 lock."
      - "ch12 사용 자리 = 박 부장 집무실 1자리만. 사무실·복도·도현 자리 등은 통과 또는 비사용."

  kim-dohyun-home:
    status: operational
    notable_changes:
      - "ch12 신규 사용: 1923-03-20(화) 늦은 오후 식탁 (도현 결정대사 + 수민 '예.') / 해 질 무렵 마당·사립문 (세 걸음 + 멈춤 + 정적). 작품 종결 시점 = 자택 마당 사립문 앞."
      - "1921 봉투 자택 서랍 안 미반출 lock — 작품 전체에서 한 번도 반출되지 않음. 작품 종결 시점에도 같은 자리·같은 모양."
      - "사립문 한 뼘 열린 채 lock (작품 종결 시점) — 닫지 않은 종결의 표지."
    interior:
      dohyun-room:
        type: 마루방 (서재 겸용)
        floor: 마룻바닥
        baseline_sounds:
          - "의자 다리가 마룻바닥을 짧게 끄는 소리 (ch9 baseline 유지)"
          - "옆집 처마 홈통의 양철 빗물 소리 (ch10 봉합 — ch12 늦은 오후 다시 들림 = '같은 소리가 다른 자리에서 자리를 잡고 있었다' L.81)"
          - "등불 갓 안 심지 흔들림 (ch10 신규 — ch12 비등장)"
          - "부엌에서 그릇 닦는 소리 (ch11 신규 — ch12 식탁 전 그릇 닿는 소리로 변주)"
        baseline_visuals:
          - "책상 위 잉크병 + 종이 더미 (ch9 수민 정리 흔적 승계)"
          - "서랍 — 작품 종결 시점 lock: 1921 봉투 같은 자리·같은 모양 그대로 (ch12 L.101 '서랍 안의 봉투는 그대로였다' 본문 명시). 두 해 동안 한 번도 반출되지 않음. ch11 03-20 식후 첫 열림 후 ch12 시점에서도 미열림 (도현이 어젯밤 마루방에서 새 봉투를 따로 작성)."
          - "창밖 마당 (ch12 늦은 오후 = 빛이 마당 한쪽에 비스듬히 깔림)"
        contents:
          - "1921 봉투 — 자택 서랍 안 같은 자리·같은 모양. 작품 종결 시점에도 그대로 (영구 미반출 lock). 안 내용 작품 전체 미명시 (영구 봉인). 외부 표면 lock: 누런 결, 모서리 한 곳 작게 접힘."
          - "어젯밤 새로 쓴 봉투 — 1923-03-19(월) 야간 / 1923-03-20(화) 새벽 사이 작성. 안 내용 = 박 부장의 1922-08 상하이 동행 객관 기록 한 조각 (도현이 ch7 영사관에서 직접 확인한 한 줄). 자기 이름 없음. 서명 없음. ch12 정오 신문사 우편함으로 이동 (자택에서 반출). 작품 종결 시점에는 자택 부재."
          - "이세아 쪽지 (ch10 신규) — ch12 변동 없음 (서랍 안 그대로 추정)"
          - "명령서 사본 (ch9 명시) — ch12 변동 없음"
      kitchen-table:
        type: 식탁 (작은 상)
        notes:
          - "ch12 신규 사용: 1923-03-20(화) 늦은 오후 (도현 평소보다 이른 귀가 시각). 두 사람 자리에 앉음. 김이 두 그릇 위로 같은 결로 올라옴 — 수민이 평소보다 한 결 정갈하게 그릇 놓음."
          - "결정대사 발화 자리 lock 2종:"
          - "  L.63 도현 — '내가 본 것이 있었네... 네가 더 자라서 묻거든 그때 답하겠네.' (한 호흡 단일 라인)"
          - "  L.69 수민 — '예.' (1단어)"
          - "도현 숟가락 절반보다 조금 더 — 지난 식탁 (ch11) 절반 자리에서 한 칸 더. 수민 그릇 안쪽도 같은 결로 절반 너머가 비어 감."
          - "두 사람 식사 천천히 마지막 몇 술까지 자리에 앉은 채로 마침."
          - "이 식탁의 침묵 = 정직한 자리의 침묵 (도현 내면 분류, 외부 명시 — '무겁지 않은 침묵이 두 사람 사이에 정직한 자리로 앉아 있었다'). 두 해 전 가을 식탁 자리가 이 식탁에 한 칸 옮겨져 옴 — 어머니 때문도 너 때문도 아니라는 것을 묻지 않은 형식으로 식탁 위에 둠."
          - "식탁 침묵 결 분류 lock (4단계): 두 해 전 가을 식탁 (어머니/너 미부여) → ch9 (거리의 침묵) → ch11 (같은 자리 침묵) → ch12 (정직한 자리 침묵 = closure)."
      hallway:
        type: 현관·마루방 → 사립문
        notes:
          - "ch12 신규 사용 — 1923-03-20(화) 오후 (이른 시각): 도현 사립문 엶 → 마당 안쪽에서 부엌 그릇 닿는 소리. 늦은 오후: 도현 마루방에서 마당으로 나옴 → 마당 끝 사립문."
          - "사립문 한 뼘 열려 있음 (평소보다 더 열려 있음) — 도현 닫지 않음 + 닫을지 말지를 자기 안에 묻지 않음. 묻지 않은 자리에 사립문이 그 한 뼘만큼 열린 채로 있음. 의도/무의식 미부여."
      garden:
        type: 마당 (작품 종결 시점 자리)
        notes:
          - "ch12 신규 명시 자리 — 1923-03-20(화) 해 질 무렵. 늦은 오후의 빛이 마당 한쪽에 비스듬히 깔림. 옆집 처마 홈통에서 늦겨울 빗물 한 줄 (ch9~ch10 누적 모티프의 closure 잔향 — '같은 소리가 다른 자리에서 자리를 잡고 있었다')."
          - "도현 발소리 closure 자리 lock — 첫 걸음 / 두 번째 걸음 / 세 번째 걸음 / 멈춤 / 정적. 발소리가 멈춘 자리에 도현이 있음. 자기 발소리의 끝을 자기가 놓는 자리."
          - "도현 내면 한 줄 자리 lock — 'L.95 그렇게는 살지 않게 되었네' (자기 안에 둔 한 줄, 그 한 줄에도 이름 안 붙임)."
          - "작품 종결 카메라 머무는 마지막 지점 — '마당 위에 정적 한 자락 그대로 머물렀다' (L.105). 다음 발소리가 떨어지기 직전."
          - "닫지 않은 종결 표지 3행 자리 (L.97~101): 사립문 한 뼘 열린 채 / 왼손 검지 흉터 같은 자리 같은 모양 / 서랍 안 봉투 그대로. '변하지 않은 채로 둔 것' 만 모은 closure."
    notes:
      - "ch12 마루방 비활성 — 도현은 ch12 시점에서 마루방 통과만 (어젯밤 새 봉투 작성한 자리). 본문 활성 자리 = 식탁 + 마당."
      - "결정대사 발화 자리 lock 일람: 박 부장 집무실 (L.21 도현 통보) / 식탁 (L.63 도현 약속 + L.69 수민 답)."
      - "마당 = 작품 종결 카메라 자리 lock. 발소리 closure + 닫지 않은 종결 표지 3행."

  goryeo-dabang:
    status: operational
    notable_changes:
      - "ch12 비등장 (ch10 등록 유지)."
    notes:
      - "ch10 두 번째 자리 lock 유지. 외부 시점 1단락 ('어느 다방 창가') 의 거리 닫힘 자리는 미명시 (도시·다방 이름 미도입 lock) — 고려다방 여부 의도적 미공개."

  newspaper-mailbox:
    status: operational
    notable_changes:
      - "ch12 신규 등록 — 1923-03-20(화) 정오 1회 등장 자리. 도현 무기명 봉투 투함."
    notes:
      - "공간 표지: 신문사 건물 외벽 한쪽에 붙어 있는 우편함. 신문사 구체 이름 미명시 (동아·조선·경성일보 후보 — 의도적 비명시 lock)."
      - "ch12 사용 자리 lock: 도현 한 박자 멈춤 (망설임 아님 — 두 해 전 어느 골목 앞에서 멈췄던 한 박자와 같은 결). 봉투 꺼냄. 손가락이 봉투 끝 놓음. 봉투 안쪽으로 떨어짐. 작은 소리 한 번 + 정적 한 자락 따라옴."
      - "셋째 길 (자기 비기명 누설) 외화 자리 — 두 해 전 도현 손이 봉투를 자기 서랍 안으로 들였던 한 박자의 거울 짝 (서랍 안 → 우편함 안)."
      - "본문 사용 횟수 = 1 (ch12 only). 작품 외 시간 폭에서의 봉투 처리·기사화 여부는 작가 외 영역 (영구 미공개)."

  jongno-street:
    status: operational
    notable_changes:
      - "ch12 사용 자리 lock 추가 — 1923-03-20(화) 정오. 도현 종로 정오 거리 (사람 적당히 오감). 우편함 투함 후 거리 사람들 중 한 명으로 걷기 시작. 자기 발소리가 정오의 거리 위에서 한 박자씩 이어짐."
      - "3월의 햇빛 한 결로 깔림. 도현 그 빛 따로 보지 않음. 종로의 반대 방향으로 한 동을 더 걸음."
    notes:
      - "ch10 → ch11 → ch12 발소리 모티프 누적 자리. ch10 한 박자 늦게 자각 → ch11 걸음과 자각 동시 → ch12 정오 거리 자기 발소리 한 박자씩 이어짐."

  unspecified-cafe:
    status: operational
    notable_changes:
      - "ch12 신규 등록 — 1923-03-20(화) 해 질 무렵 (도현 마당 자리와 동시각). 외부 시점 1단락. '어느 다방 창가 자리.' 도시·다방 이름·작전 단어 미명시 lock."
    notes:
      - "사용 자리 lock: 창가 자리. 찻잔 하나 절반쯤 남음. 발소리 여전히 없음 (이세아 부재 표지 closure)."
      - "본문 사용 횟수 = 1 (ch12 외부 시점 1단락만). 도현 본인 비등장."
      - "이세아 closure 자리 — 도현 측 발소리 자기 주인 (마당) 과 비대칭 거울 짝."
