      - "도현 책상 / 이세아 자리 — ch11 시점에 두 책상의 결이 처음 비대칭으로 자리잡음 (도현 자리 글자 따라가지 않음 / 이세아 자리 정리 모양 본인 결 그대로)"

  kim-dohyun-home:
    status: operational
    notable_changes:
      - "ch11 신규 사용: 1923-03-18(일) 마루방 서랍 손잡이 1회 손 얹음 (미개봉, L.91 회상). 1923-03-19(월) 야간 마루방 세 길 정렬 + 봉투 외부 표면 첫 가시화 + 백지 서랍 아래 밀기. 1923-03-20(화) 아침 식탁 동행 선언 + 식후 마루방 서랍 첫 열림 (봉투 직시·미반출) + 거리로 나서기."
      - "마당 양철 빗물 소리 (옆집 처마 홈통) ch10 봉합 후 ch11 변동 없음 (배경 유지)."
    interior:
      dohyun-room:
        type: 마루방 (서재 겸용)
        floor: 마룻바닥
        baseline_sounds:
          - "의자 다리가 마룻바닥을 짧게 끄는 소리 (ch9 baseline 유지)"
          - "옆집 처마 홈통의 양철 빗물 소리 (ch10 봉합 — ch11 변동 없음)"
          - "등불 갓 안 심지 흔들림 (ch10 신규 — ch11 변동 없음)"
          - "부엌에서 그릇 닦는 소리가 마루방까지 가늘게 들어옴 (ch11 신규, 1923-03-20 화 식후)"
        baseline_visuals:
          - "책상 위 잉크병 + 종이 더미 (ch9 수민 정리 흔적 승계)"
          - "서랍 — ch11 변화: 두 해째 닫혀 있던 자리가 1923-03-20(화) 아침 식후 첫 열림. 봉투 직시 후 미반출 + 다시 닫음. 1923-03-19(월) 야간에는 서랍 아래쪽 빈자리에 백지 한 장 (한 번 접지 않고) 밀어 넣음."
          - "창밖 마당 (ch10 야간 어두움 → ch11 야간 어둡고 조용함)"
        contents:
          - "1921 봉투 — 서랍 안 두 해째 같은 자리·같은 모양. ch11 신규 표면 가시화: 종이 결 누랬음, 모서리 한 곳 작게 접힘 (두 해 전 도현 손이 마지막으로 놓을 때 만들어진 접힘). 안 내용 미명시 (도현 본인만 앎)."
          - "백지 한 장 — 1923-03-19(월) 야간 책상 위에 놓였다가 한 번 접지 않고 그대로 서랍 아래쪽 빈자리로 밀려 들어감 (펜 미사용)."
          - "이세아 쪽지 (ch10 신규) — ch11 변동 없음 (서랍 안 그대로)"
          - "명령서 사본 (ch9 명시) — ch11 변동 없음"
      kitchen-table:
        type: 식탁 (작은 상)
        notes:
          - "ch11 신규 사용: 1923-03-20(화) 아침 두 사람 자리에 앉음 — 자리에 앉는 일이 지난 식탁 (ch9: 수민 도현 맞은편 서 있음) 과 다른 첫 번째 사실."
          - "수민이 차린 밥그릇 김 — 도현 자리 앞에도 같은 결로 김."
          - "결정대사 두 줄 발화 자리 lock: 'L.69 도현 — ...그러도록 하지.' / 'L.77 수민 — 저는 변하고 있어요. 아버지도 그러시죠.'"
          - "지난 식탁의 침묵 = 거리의 침묵 / 이 아침의 침묵 = 같은 자리에서의 침묵 (도현 내면 분류)."
          - "도현 숟가락 — 지난 식탁: 들었다 그대로 내려놓음. 이 아침: 절반에 가까이 떠 입까지 가져감."
      hallway:
        type: 현관·마루방 → 사립문
        notes:
          - "ch11 신규 명시 — 1923-03-20(화) 식후 도현이 마루방 문 닫음 → 현관에서 신을 신음 → 사립문 지나 거리. 첫 걸음 발소리 자각 자리."
    notes:
      - "ch11 마루방 사용은 ch9~ch10 명시와 정합. 같은 책상·같은 서랍·같은 의자 자리."
      - "서랍 첫 열림 lock: 1923-03-20 화 식후. 두 해째 닫혀 있던 자리. ch9 (서랍 손잡이 차가움, 끝내 열지 않음) → ch10 (다방에서 돌아온 밤에도 열지 않음) → ch11 일요일 회상 (열지 않음) → ch11 어젯밤 (열지 않음) → ch11 이 아침 (처음 열음, 미반출). 시간 누적 lock."
      - "결정대사 발화 자리 lock — 식탁 (수민·도현 두 줄) / 박 부장 집무실 (박 부장 한 줄). ch12+ 회상 시 같은 자리 명시."

  goryeo-dabang:
    status: operational
    notable_changes:
