      - "도현 경무국 복귀 2주차 (1923-03-12 ~ 03-19) — ch11 신규 사용: 1923-03-19(월) 10:10경 박 부장 집무실 호출 + 14시경 사무실 이세아 부재 첫 인지."
    interior:
      park-office:
        type: 박 부장 집무실 (3층)
        notes:
          - "ch11 신규 명시 — 책상 위 서류 한 장을 가지런히 밀어 둔 자리. 의자 하나 (도현 좌석). 친근한 손짓으로 의자 가리킴."
          - "결정대사 L.17 발화 자리 lock — '1921년 가을의 일은, 묻어둔 게 가장 작아서 좋았던 것이지.' (박 부장)"
          - "복도: 평소와 같은 자리에 같은 모양으로 닫힌 문. 사환이 호출 전할 때 한 박자 머뭇거림. 복도 창의 3월 늦은 오전 햇빛 한 줄 (도현 보지 않음)."
      dohyun-desk:
        type: 도현 자리 (사무실)
        notes:
          - "ch11 신규 사용 — 1923-03-19(월) 14시경. 도현이 자기 자리 앉아 서류 폄, 글자 따라가지 않음."
          - "두 걸음 반 옆쪽에 이세아 자리 — 시선이 자기도 모르게 그쪽으로 감."
      lee-desk:
        type: 이세아 자리 (사무실, 도현 자리에서 두 걸음 반 옆)
        notes:
          - "ch11 신규 명시 — 1923-03-19(월) 오전 자리에 있었음 (도현 공기로 인지). 오후 14시경 부재 첫 인지."
          - "책상 위 정리 모양: 본인이 자리를 떠날 때의 결 그대로. 만년필 뚜껑 닫힘. 서류함 모서리 책상 모서리와 평행."
          - "퇴근 즈음 저녁의 창빛이 그 자리 위로 짧게 들어왔다 사라짐."
    notes:
